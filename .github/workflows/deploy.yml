# .github/workflows/deploy.yml
#
# CI/CD pipeline — runs on every push to main branch
#
# WHAT IT DOES:
#   1. Lint + type-check Python and TypeScript
#   2. Build Docker images to verify they compile
#   3. Deploy to Railway (or Render) automatically
#
# SECRETS NEEDED (set in GitHub repo Settings → Secrets → Actions):
#   RAILWAY_TOKEN        — from railway.app dashboard
#   GROQ_API_KEY         — your Groq key
#   GOOGLE_API_KEY       — your Google key
#   TAVILY_API_KEY       — your Tavily key
#   LANGSMITH_API_KEY    — your LangSmith key
#   DATABASE_URL         — Railway PostgreSQL connection string

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]   # Also run on PRs — but don't deploy

jobs:

  # ── Job 1: Backend checks ───────────────────────────────────────────────────
  backend-check:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Check imports
        run: |
          cd backend
          python -c "
          import sys; sys.path.insert(0, '.')
          from config import settings
          from schemas.task import TaskRequest, TaskResponse
          from schemas.agent_state import AgentState
          from db.database import TaskRecord
          from guardrails.input_guard import check_input
          print('All imports OK')
          "
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/automator

  # ── Job 2: Frontend checks ──────────────────────────────────────────────────
  frontend-check:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        run: |
          cd frontend
          npm ci
          npm run build

  # ── Job 3: Deploy (only on main branch, not PRs) ───────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-check]   # Only runs if both checks pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend
        run: railway up --service backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy frontend
        run: railway up --service frontend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
